<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2435" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#22d3ee" fill-opacity="0.10"/>
    </pattern>
    <filter id="ds" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Top frame line -->
  <line x1="0" y1="32" x2="1280" y2="32" stroke="#1f2937" stroke-width="1"/>
  <line x1="0" y1="608" x2="1280" y2="608" stroke="#1f2937" stroke-width="1"/>

  <!-- Top status bar text -->
  <text x="40" y="22" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" font-size="11" fill="#475569" letter-spacing="2">
    ~ / projects / video-production-kit
  </text>
  <text x="1240" y="22" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" font-size="11" fill="#475569" letter-spacing="2">
    main · v0.1
  </text>

  <!-- LEFT: Terminal-ish title block -->
  <g transform="translate(60, 110)">
    <!-- Tag -->
    <g>
      <rect x="0" y="0" width="285" height="28" rx="4" fill="#0e1827" stroke="#22d3ee" stroke-width="1"/>
      <text x="14" y="19" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#22d3ee" font-weight="600" letter-spacing="2">
        [ CLAUDE CODE · SKILL · v0.1 ]
      </text>
    </g>

    <!-- Title -->
    <text x="0" y="120" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" font-size="74" fill="#f1f5f9" font-weight="800" letter-spacing="-1">
      Video Production
    </text>
    <text x="0" y="200" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" font-size="74" fill="#f1f5f9" font-weight="800" letter-spacing="-1">
      Kit<tspan fill="#fbbf24" dx="14">_</tspan>
    </text>

    <!-- Subtitle -->
    <text x="0" y="252" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" fill="#94a3b8" font-weight="400">
      <tspan fill="#22d3ee">$</tspan>  Uzun ham kayıttan yayına hazır YouTube videosuna,
    </text>
    <text x="0" y="282" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" fill="#94a3b8" font-weight="400">
      <tspan>   </tspan><tspan fill="#f1f5f9" font-weight="600">5 odaklanmış Claude Code agent'ı</tspan> ile.
    </text>

    <!-- Agent pills -->
    <g transform="translate(0, 320)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="600">
      <g>
        <rect x="0" y="0" width="115" height="30" rx="4" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
        <text x="14" y="20" fill="#22d3ee">▸ transcript</text>
      </g>
      <g transform="translate(125, 0)">
        <rect x="0" y="0" width="105" height="30" rx="4" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
        <text x="14" y="20" fill="#22d3ee">▸ cut-list</text>
      </g>
      <g transform="translate(240, 0)">
        <rect x="0" y="0" width="105" height="30" rx="4" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
        <text x="14" y="20" fill="#22d3ee">▸ subtitle</text>
      </g>
      <g transform="translate(355, 0)">
        <rect x="0" y="0" width="135" height="30" rx="4" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
        <text x="14" y="20" fill="#22d3ee">▸ description</text>
      </g>
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="90" height="30" rx="4" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
        <text x="14" y="20" fill="#22d3ee">▸ social</text>
      </g>
      <g transform="translate(100, 40)">
        <rect x="0" y="0" width="170" height="30" rx="4" fill="#0e1827" stroke="#fbbf24" stroke-width="1"/>
        <text x="14" y="20" fill="#fbbf24">★ CapCut-aware</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: Terminal window with editor + agent log -->
  <g transform="translate(750, 130)" filter="url(#ds)">
    <!-- Window -->
    <rect x="0" y="0" width="470" height="335" rx="10" fill="#0e1827" stroke="#1f2a3d" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="470" height="32" rx="10" fill="#131c2e"/>
    <rect x="0" y="22" width="470" height="10" fill="#131c2e"/>
    <circle cx="18" cy="16" r="5" fill="#ef4444"/>
    <circle cx="36" cy="16" r="5" fill="#fbbf24"/>
    <circle cx="54" cy="16" r="5" fill="#4ade80"/>
    <text x="235" y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="2">
      timeline · 7:00 · 146 captions
    </text>

    <!-- Mini timeline tracks -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="430" height="20" rx="3" fill="#0a1120"/>
      <rect x="2" y="2" width="60" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>
      <rect x="66" y="2" width="100" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>
      <rect x="170" y="2" width="80" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>
      <rect x="254" y="2" width="48" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>
      <rect x="306" y="2" width="60" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>
      <rect x="370" y="2" width="58" height="16" rx="2" fill="#22d3ee" opacity="0.55"/>

      <rect x="0" y="26" width="430" height="20" rx="3" fill="#0a1120"/>
      <rect x="10" y="28" width="80" height="16" rx="2" fill="#fbbf24" opacity="0.55"/>
      <rect x="100" y="28" width="120" height="16" rx="2" fill="#fbbf24" opacity="0.55"/>
      <rect x="240" y="28" width="70" height="16" rx="2" fill="#fbbf24" opacity="0.55"/>
      <rect x="320" y="28" width="100" height="16" rx="2" fill="#fbbf24" opacity="0.55"/>

      <rect x="0" y="52" width="430" height="20" rx="3" fill="#0a1120"/>
      <rect x="40" y="54" width="60" height="16" rx="2" fill="#94a3b8" opacity="0.45"/>
      <rect x="160" y="54" width="80" height="16" rx="2" fill="#94a3b8" opacity="0.45"/>
      <rect x="280" y="54" width="100" height="16" rx="2" fill="#94a3b8" opacity="0.45"/>

      <!-- caption -->
      <rect x="0" y="84" width="430" height="22" rx="11" fill="#070a14" stroke="#22d3ee" stroke-width="1"/>
      <text x="215" y="100" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#e5e7eb">
        "5 odaklanmış agent ile editliyorum…"
      </text>

      <!-- Playhead -->
      <line x1="172" y1="-4" x2="172" y2="112" stroke="#fbbf24" stroke-width="1.5"/>
      <polygon points="167,-6 177,-6 172,2" fill="#fbbf24"/>
    </g>

    <!-- Agent log -->
    <g transform="translate(20, 178)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12">
      <text x="0" y="0" fill="#475569">$ </text>
      <text x="14" y="0" fill="#e5e7eb">claude</text>
      <text x="68" y="0" fill="#94a3b8">: timeline 03'ün altyazısını çıkar</text>

      <text x="0" y="22" fill="#22d3ee">→</text>
      <text x="14" y="22" fill="#94a3b8">spawning </text>
      <text x="86" y="22" fill="#fbbf24">subtitle-agent</text>

      <text x="0" y="42" fill="#4ade80">✓</text>
      <text x="14" y="42" fill="#94a3b8">whisper turbo loaded</text>

      <text x="0" y="62" fill="#4ade80">✓</text>
      <text x="14" y="62" fill="#94a3b8">word-level transcript · </text>
      <text x="190" y="62" fill="#e5e7eb">137 segs</text>

      <text x="0" y="82" fill="#4ade80">✓</text>
      <text x="14" y="82" fill="#94a3b8">SRT written → </text>
      <text x="118" y="82" fill="#22d3ee">~/Desktop/altyazi.srt</text>

      <text x="0" y="108" fill="#22d3ee">$ </text>
      <text x="14" y="108" fill="#e5e7eb">█</text>
    </g>
  </g>

  <!-- Cute reel mascot (now in cyan/amber, neutral) -->
  <g transform="translate(685, 540)" filter="url(#ds)">
    <circle r="44" fill="#0a1120" stroke="#22d3ee" stroke-width="1.5"/>
    <circle r="8" fill="#22d3ee"/>
    <g fill="#22d3ee">
      <circle cx="22" cy="0" r="5"/>
      <circle cx="-22" cy="0" r="5"/>
      <circle cx="0" cy="22" r="5"/>
      <circle cx="0" cy="-22" r="5"/>
    </g>
    <!-- Cute eyes -->
    <circle cx="-12" cy="-4" r="2.5" fill="#fbbf24"/>
    <circle cx="12" cy="-4" r="2.5" fill="#fbbf24"/>
    <!-- Smile -->
    <path d="M -7 6 Q 0 11 7 6" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Footer -->
  <text x="40" y="628" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="2">
    github.com/selmakcby/video-production-kit
  </text>
  <text x="1240" y="628" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#475569" letter-spacing="2">
    MIT  ·  @selmaaii
  </text>
</svg>
